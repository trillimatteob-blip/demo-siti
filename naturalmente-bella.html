<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Naturalmente Bella - Salone di bellezza a Milano. Trattamenti professionali, estetica e benessere. Valutazione 4.8/5.">
    <title>Naturalmente Bella | Salone di Bellezza Milano</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B5E6D;
            --primary-dark: #6D4757;
            --primary-light: #C9A0B0;
            --accent: #D4AF8C;
            --accent-light: #F0DEC8;
            --bg-light: #FDF8F5;
            --bg-section: #FAF3EE;
            --text-dark: #2C2020;
            --text-medium: #5A4040;
            --text-light: #8A7070;
            --white: #FFFFFF;
            --shadow: 0 4px 24px rgba(139, 94, 109, 0.12);
            --shadow-lg: 0 8px 40px rgba(139, 94, 109, 0.18);
            --radius: 16px;
            --radius-sm: 8px;
            --transition: all 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(253, 248, 245, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(139, 94, 109, 0.1);
            padding: 0 24px;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: -0.3px;
        }

        .nav-logo-text span {
            display: block;
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-light);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-medium);
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white) !important;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600 !important;
            text-decoration: none;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(139, 94, 109, 0.3);
        }

        .nav-cta::after {
            display: none !important;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 94, 109, 0.4) !important;
            color: var(--white) !important;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--primary-dark);
            border-radius: 2px;
            transition: var(--transition);
        }

        /* ===== HERO ===== */
        #hero {
            min-height: 100vh;
            background: linear-gradient(135deg, #2C1A20 0%, #4A2535 40%, #6D3A50 100%);
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 100px 24px 60px;
        }

        .hero-bg-shapes {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .hero-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
        }

        .hero-shape-1 {
            width: 600px;
            height: 600px;
            background: var(--primary-light);
            top: -200px;
            right: -150px;
        }

        .hero-shape-2 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            bottom: -100px;
            left: -100px;
        }

        .hero-shape-3 {
            width: 200px;
            height: 200px;
            background: var(--white);
            top: 30%;
            left: 20%;
        }

        .hero-inner {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(212, 175, 140, 0.2);
            border: 1px solid rgba(212, 175, 140, 0.3);
            color: var(--accent-light);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .hero-badge-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.4); }
        }

        .hero-title {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 800;
            color: var(--white);
            line-height: 1.15;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        .hero-title .highlight {
            color: var(--accent);
            position: relative;
        }

        .hero-subtitle {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 36px;
            max-width: 480px;
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent), #C4956A);
            color: var(--text-dark);
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: var(--transition);
            box-shadow: 0 8px 32px rgba(212, 175, 140, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(212, 175, 140, 0.5);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            color: var(--white);
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: var(--transition);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
        }

        .hero-stats {
            display: flex;
            gap: 32px;
            margin-top: 48px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .hero-visual {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
        }

        .hero-card-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 24px;
        }

        .hero-card-title {
            color: var(--white);
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .hero-card-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        .hero-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(212, 175, 140, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            color: var(--accent);
            font-size: 1rem;
        }

        .rating-text {
            color: var(--white);
            font-weight: 700;
            font-size: 0.95rem;
        }

        .rating-count {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-left: auto;
        }

        .hero-services-preview {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .service-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 10px 14px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
        }

        .service-pill-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        /* ===== SECTION COMMONS ===== */
        section {
            padding: 96px 24px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-tag {
            display: inline-block;
            background: linear-gradient(135deg, rgba(139, 94, 109, 0.1), rgba(139, 94, 109, 0.05));
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
            border: 1px solid rgba(139, 94, 109, 0.15);
        }

        .section-title {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
        }

        .section-subtitle {
            font-size: 1.05rem;
            color: var(--text-light);
            max-width: 560px;
            line-height: 1.7;
        }

        .section-header {
            margin-bottom: 56px;
        }

        .section-header.centered {
            text-align: center;
        }

        .section-header.centered .section-subtitle {
            margin: 0 auto;
        }

        /* ===== SERVIZI ===== */
        #servizi {
            background: var(--white);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .service-card {
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: 36px 28px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .service-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            opacity: 0;
            transition: var(--transition);
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .service-card:hover::before {
            opacity: 0.03;
        }

        .service-icon-wrap {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(139, 94, 109, 0.12), rgba(139, 94, 109, 0.06));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .service-card:hover .service-icon-wrap {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            transform: scale(1.05);
        }

        .service-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .service-desc {
            font-size: 0.88rem;
            color: var(--text-light);
            line-height: 1.65;
        }

        .service-arrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 16px;
            transition: var(--transition);
        }

        .service-card:hover .service-arrow {
            gap: 10px;
        }

        /* ===== CHI SIAMO ===== */
        #chi-siamo {
            background: var(--bg-section);
        }

        .about-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .about-visual {
            position: relative;
        }

        .about-main-card {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            border-radius: 24px;
            padding: 48px;
            color: var(--white);
            position: relative;
            overflow: hidden;
        }

        .about-main-card::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .about-main-card::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }

        .about-big-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .about-card-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .about-card-text {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .about-floating-badge {
            position: absolute;
            bottom: -20px;
            right: -20px;
            background: var(--white);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .about-floating-badge .value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }

        .about-floating-badge .label {
            font-size: 0.7rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .about-content {
            padding-right: 20px;
        }

        .about-text {
            font-size: 1rem;
            color: var(--text-medium);
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .about-features {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 36px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: var(--white);
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 2px 12px rgba(139, 94, 109, 0.07);
        }

        .feature-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(139, 94, 109, 0.1), rgba(139, 94, 109, 0.05));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .feature-title {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .feature-desc {
            font-size: 0.82rem;
            color: var(--text-light);
            line-height: 1.5;
        }

        /* ===== RECENSIONI ===== */
        #recensioni {
            background: var(--white);
        }

        .reviews-overview {
            display: flex;
            align-items: center;
            gap: 60px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            border-radius: 24px;
            padding: 48px;
            margin-bottom: 48px;
            color: var(--white);
        }

        .rating-big {
            text-align: center;
            flex-shrink: 0;
        }

        .rating-number {
            font-size: 5rem;
            font-weight: 900;
            color: var(--white);
            line-height: 1;
        }

        .rating-stars-big {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin: 8px 0;
        }

        .rating-stars-big .star {
            font-size: 1.3rem;
        }

        .rating-total {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        .rating-divider {
            width: 1px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .rating-bars {
            flex: 1;
        }

        .rating-bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .bar-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            width: 40px;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 6px;
            background: var(--accent);
        }

        .rating-highlights {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .highlight-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.88rem;
        }

        .highlight-check {
            width: 28px;
            height: 28px;
            background: rgba(212, 175, 140, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .review-card {
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: 28px;
            border: 1px solid rgba(139, 94, 109, 0.08);
            transition: var(--transition);
        }

        .review-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .reviewer-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--white);
            flex-shrink: 0;
        }

        .reviewer-name {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 0.92rem;
        }

        .reviewer-date {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 2px;
        }

        .review-stars {
            display: flex;
            gap: 2px;
            margin-bottom: 12px;
        }

        .review-stars .star {
            font-size: 0.85rem;
        }

        .review-text {
            font-size: 0.88rem;
            color: var(--text-medium);
            line-height: 1.65;
            position: relative;
        }

        .review-text::before {
            content: '"';
            font-size: 3rem;
            color: var(--primary-light);
            position: absolute;
            top: -20px;
            left: -8px;
            line-height: 1;
            opacity: 0.4;
        }

        /* ===== CONTATTI ===== */
        #contatti {
            background: var(--bg-section);
        }

        .contact-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }

        .contact-info-card {
            background: var(--white);
            border-radius: 24px;
            padding: 48px;
            box-shadow: var(--shadow);
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid rgba(139, 94, 109, 0.08);
        }

        .contact-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .contact-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, rgba(139, 94, 109, 0.1), rgba(139, 94, 109, 0.05));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .contact-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .contact-value {
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 600;
            line-height: 1.5;
        }
