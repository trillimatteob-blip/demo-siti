<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Estetica & Benessere - Centro Estetico e Salone di Bellezza a Milano. Viale Monza 363, 20128 Milano. Prenota il tuo appuntamento.">
    <title>Estetica & Benessere | Centro Bellezza Milano</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c9a96e;
            --primary-dark: #a8844e;
            --primary-light: #e8d5b0;
            --secondary: #2d2d2d;
            --accent: #f5efe6;
            --white: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #555555;
            --text-light: #888888;
            --border: #e8e0d5;
            --shadow: rgba(0,0,0,0.08);
            --shadow-md: rgba(0,0,0,0.15);
            --gradient: linear-gradient(135deg, #c9a96e 0%, #a8844e 100%);
            --gradient-soft: linear-gradient(135deg, #f5efe6 0%, #ede4d4 100%);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            color: var(--text-dark);
            background: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 38px;
            height: 38px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary);
            letter-spacing: -0.3px;
        }

        .nav-logo-text span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-mid);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
            letter-spacing: 0.3px;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-cta {
            background: var(--gradient);
            color: var(--white) !important;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600 !important;
            transition: transform 0.2s, box-shadow 0.2s !important;
            box-shadow: 0 4px 15px rgba(201,169,110,0.3);
        }

        .nav-cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(201,169,110,0.4) !important;
            color: var(--white) !important;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--secondary);
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            background: var(--gradient-soft);
            display: flex;
            align-items: center;
            padding: 100px 24px 60px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(201,169,110,0.12) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(201,169,110,0.12);
            border: 1px solid rgba(201,169,110,0.3);
            color: var(--primary-dark);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .hero-title {
            font-size: clamp(36px, 5vw, 60px);
            font-weight: 800;
            line-height: 1.1;
            color: var(--secondary);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero-title span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-mid);
            margin-bottom: 36px;
            line-height: 1.7;
            max-width: 460px;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--gradient);
            color: var(--white);
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 25px rgba(201,169,110,0.35);
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(201,169,110,0.45);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--secondary);
            text-decoration: none;
            padding: 16px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid var(--border);
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .hero-stats {
            display: flex;
            gap: 32px;
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }

        .stat-item {
            text-align: left;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: var(--secondary);
            letter-spacing: -0.5px;
        }

        .stat-number span {
            color: var(--primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 500;
            margin-top: 2px;
        }

        .hero-visual {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px var(--shadow-md);
            max-width: 380px;
            width: 100%;
        }

        .hero-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .hero-card-avatar {
            width: 52px;
            height: 52px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .hero-card-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--secondary);
        }

        .hero-card-info p {
            font-size: 13px;
            color: var(--text-light);
        }

        .hero-rating-display {
            background: var(--gradient-soft);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .rating-stars-large {
            font-size: 28px;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 8px;
        }

        .rating-number-large {
            font-size: 42px;
            font-weight: 800;
            color: var(--secondary);
            line-height: 1;
        }

        .rating-sub {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .hero-services-preview {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .service-preview-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--accent);
            border-radius: 12px;
        }

        .service-preview-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .service-preview-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary);
        }

        /* ===== SECTION COMMON ===== */
        section {
            padding: 90px 24px;
        }

        .section-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-tag {
            display: inline-block;
            background: rgba(201,169,110,0.12);
            color: var(--primary-dark);
            font-size: 12px;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 50px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .section-subtitle {
            font-size: 17px;
            color: var(--text-mid);
            max-width: 560px;
            line-height: 1.7;
        }

        .section-header {
            margin-bottom: 56px;
        }

        /* ===== SERVIZI ===== */
        .servizi {
            background: var(--white);
        }

        .servizi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .servizio-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .servizio-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .servizio-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px var(--shadow-md);
            border-color: transparent;
        }

        .servizio-card:hover::before {
            transform: scaleX(1);
        }

        .servizio-card.featured {
            background: var(--gradient);
            border-color: transparent;
            color: var(--white);
        }

        .servizio-card.featured::before {
            display: none;
        }

        .servizio-icon {
            width: 56px;
            height: 56px;
            background: var(--gradient-soft);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 20px;
        }

        .servizio-card.featured .servizio-icon {
            background: rgba(255,255,255,0.2);
        }

        .servizio-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .servizio-card.featured .servizio-title {
            color: var(--white);
        }

        .servizio-desc {
            font-size: 14px;
            color: var(--text-mid);
            line-height: 1.7;
        }

        .servizio-card.featured .servizio-desc {
            color: rgba(255,255,255,0.85);
        }

        .servizio-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
        }

        .servizio-tag {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            background: var(--accent);
            color: var(--primary-dark);
            border-radius: 50px;
        }

        .servizio-card.featured .servizio-tag {
            background: rgba(255,255,255,0.2);
            color: var(--white);
        }

        /* ===== CHI SIAMO ===== */
        .chi-siamo {
            background: var(--gradient-soft);
        }

        .chi-siamo-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .chi-siamo-visual {
            position: relative;
        }

        .chi-siamo-card-main {
            background: var(--white);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px var(--shadow-md);
        }

        .cs-icon-wrap {
            width: 72px;
            height: 72px;
            background: var(--gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 24px;
        }

        .chi-siamo-card-main h3 {
            font-size: 22px;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 16px;
        }

        .chi-siamo-card-main p {
            font-size: 15px;
            color: var(--text-mid);
            line-height: 1.8;
        }

        .floating-badge {
            position: absolute;
            bottom: -20px;
            right: -20px;
            background: var(--gradient);
            color: var(--white);
            border-radius: 18px;
            padding: 20px 24px;
            box-shadow: 0 10px 30px rgba(201,169,110,0.4);
        }

        .floating-badge-number {
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
        }

        .floating-badge-text {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
            font-weight: 600;
        }

        .chi-siamo-content .section-subtitle {
            max-width: 100%;
            margin-bottom: 32px;
        }

        .features-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .feature-icon {
            width: 44px;
            height: 44px;
            background: rgba(201,169,110,0.12);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .feature-text h4 {
            font-size: 15px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 4px;
        }

        .feature-text p {
            font-size: 14px;
            color: var(--text-mid);
            line-height: 1.6;
        }

        /* ===== RECENSIONI ===== */
        .recensioni {
            background: var(--white);
        }

        .recensioni-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 56px;
            flex-wrap: wrap;
            gap: 24px;
        }

        .rating-summary {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--gradient-soft);
            border-radius: 20px;
            padding: 24px 32px;
        }

        .rating-big {
            text-align: center;
        }

        .rating-big-number {
            font-size: 48px;
            font-weight: 800;
            color: var(--secondary);
            line-height: 1;
        }

        .rating-stars {
            color: #f5a623;
            font-size: 18px;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .rating-count {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 2px;
        }

        .rating-divider {
            width: 1px;
            height: 60px;
            background: var(--border);
        }

        .rating-bars {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 160px;
        }

        .rating-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rating-bar-label {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 600;
            width: 12px;
        }

        .rating-bar-track {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .rating-bar-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 3px;
        }

        .recensioni-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .recensione-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .recensione-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px var(--shadow);
        }

        .rec-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .rec-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: var(--white);
            flex-shrink: 0;
        }

        .rec-info h4 {
            font-size: 15px;
            font-weight: 700;
            color: var(--secondary);
        }

        .rec-info p {
            font-size: 12px;
            color: var(--text-light);
        }

        .rec-stars {
            color: #f5a623;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .rec-text {
            font-size: 14px;
            color: var(--text-mid);
            line-height: 1.7;
            font-style: italic;
        }

        .rec-quote {
            font-size: 40px;
            color: var(--primary-light);
            line-height: 0.8;
            font-family: Georgia, serif;
            margin-bottom: 8px;
        }

        /* ===== CONTATTI ===== */
        .contatti {
            background: var(--secondary);
            color: var(--white);
        }

        .contatti .section-tag {
            background: rgba(201,169,110,0.2);
            color: var(--primary-light);
        }

        .contatti .section-title {
            color: var(--white);
        }

        .contatti .section-subtitle {
            color: rgba(255,255,255,0.65);
        }

        .contatti-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }

        .contatti-info {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .contatto-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .contatto-icon {
            width: 48px;
            height: 48px;
            background: rgba(201,169,110,0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .contatto-text h4 {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
        }

        .contatto-text p,
        .contatto-text a {
            font-size: 16px;
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .contatto-text a:hover {
            color: var(--primary);
        }

        .cta-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
        }

        .cta-box h3 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .cta-box p {
            font-size: 15px;
            color: rgba(255,255,255,0.65);
            margin-bottom: 32px;
            line-height: 1.7;
        }

        .cta-btn-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--gradient);
            color: var(--white);
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 25px rgba(201,169,110,0.35);
            margin-bottom: 16px;
            width: 100%;
        }

        .cta-btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(201,169,110,0.5);
        }

        .cta-note {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            text-align: center;
        }

        .orari-title {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 16px;
        }

        .orari-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .orario-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .orario-giorno {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }

        .orario-ora {
