<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Beauté estetica e benessere - Centro estetico a Milano. Trattamenti viso, corpo e benessere. Via Adriano, 94, Milano.">
<title>Beauté Estetica e Benessere | Milano</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --rose: #c9a99a;
    --rose-light: #f0e0d8;
    --rose-dark: #a07060;
    --gold: #c8a96e;
    --gold-light: #f5ead8;
    --dark: #2c1f1a;
    --dark-soft: #4a3830;
    --gray: #7a6a65;
    --gray-light: #f9f4f2;
    --white: #ffffff;
    --shadow: 0 8px 40px rgba(44,31,26,0.10);
    --shadow-sm: 0 2px 16px rgba(44,31,26,0.08);
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    color: var(--dark);
    background: var(--white);
    line-height: 1.6;
  }

  /* NAVBAR */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(201,169,154,0.2);
    padding: 0 24px;
  }

  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
  }

  .nav-logo {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .nav-logo span:first-child {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--dark);
  }

  .nav-logo span:last-child {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rose-dark);
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--dark-soft);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .nav-links a:hover {
    color: var(--rose-dark);
  }

  .nav-cta {
    background: var(--rose-dark);
    color: var(--white) !important;
    padding: 10px 22px;
    border-radius: 50px;
    font-weight: 600 !important;
    transition: background 0.2s, transform 0.2s !important;
  }

  .nav-cta:hover {
    background: var(--dark) !important;
    transform: translateY(-1px);
  }

  .nav-hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
  }

  .nav-hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--dark);
    border-radius: 2px;
    transition: all 0.3s;
  }

  @media (max-width: 768px) {
    .nav-links {
      display: none;
      position: absolute;
      top: 68px;
      left: 0;
      right: 0;
      background: var(--white);
      flex-direction: column;
      gap: 0;
      border-bottom: 1px solid rgba(201,169,154,0.2);
      box-shadow: var(--shadow-sm);
    }

    .nav-links.open {
      display: flex;
    }

    .nav-links li {
      width: 100%;
      border-bottom: 1px solid var(--rose-light);
    }

    .nav-links a {
      display: block;
      padding: 16px 24px;
      font-size: 15px;
    }

    .nav-cta {
      border-radius: 0 !important;
      padding: 16px 24px !important;
      text-align: center;
      background: var(--rose-dark) !important;
    }

    .nav-hamburger {
      display: flex;
    }
  }

  /* HERO */
  #hero {
    min-height: 100vh;
    background: linear-gradient(135deg, #2c1f1a 0%, #4a3830 40%, #6b4e42 100%);
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding-top: 68px;
  }

  .hero-bg-decoration {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,154,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-bg-decoration-2 {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,110,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 80px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .hero-content {
    color: var(--white);
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,169,110,0.15);
    border: 1px solid rgba(200,169,110,0.3);
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 50px;
    margin-bottom: 24px;
  }

  .hero-badge::before {
    content: '✦';
    font-size: 10px;
  }

  .hero-title {
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }

  .hero-title .accent {
    color: var(--rose);
  }

  .hero-subtitle {
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 36px;
    line-height: 1.7;
    max-width: 480px;
  }

  .hero-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--rose);
    color: var(--dark);
    text-decoration: none;
    padding: 16px 32px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: all 0.3s;
    box-shadow: 0 4px 24px rgba(201,169,154,0.4);
  }

  .btn-primary:hover {
    background: var(--white);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(201,169,154,0.5);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--white);
    text-decoration: none;
    padding: 16px 32px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    border: 2px solid rgba(255,255,255,0.3);
    transition: all 0.3s;
  }

  .btn-secondary:hover {
    border-color: var(--rose);
    color: var(--rose);
    transform: translateY(-2px);
  }

  .hero-visual {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .hero-card-stack {
    position: relative;
    width: 320px;
    height: 380px;
  }

  .hero-card {
    position: absolute;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 28px;
    color: white;
  }

  .hero-card-main {
    width: 280px;
    top: 20px;
    left: 20px;
    z-index: 3;
  }

  .hero-card-back {
    width: 260px;
    top: 0;
    left: 40px;
    z-index: 1;
    background: rgba(201,169,154,0.12);
    transform: rotate(4deg);
  }

  .hcard-icon {
    width: 52px;
    height: 52px;
    background: var(--rose);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 16px;
  }

  .hcard-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .hcard-text {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    line-height: 1.6;
  }

  .hero-stats {
    display: flex;
    gap: 20px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  .hero-stat-label {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
  }

  @media (max-width: 768px) {
    .hero-inner {
      grid-template-columns: 1fr;
      gap: 40px;
      text-align: center;
    }

    .hero-subtitle {
      margin-left: auto;
      margin-right: auto;
    }

    .hero-actions {
      justify-content: center;
    }

    .hero-visual {
      order: -1;
    }

    .hero-card-stack {
      width: 260px;
      height: 300px;
    }

    .hero-card-main {
      width: 230px;
    }

    .hero-card-back {
      width: 210px;
    }

    .hero-stats {
      justify-content: center;
    }
  }

  /* DIVIDER */
  .section-divider {
    height: 80px;
    background: linear-gradient(to bottom, transparent, var(--gray-light));
  }

  /* SERVIZI */
  #servizi {
    background: var(--gray-light);
    padding: 80px 24px;
  }

  .section-header {
    text-align: center;
    max-width: 600px;
    margin: 0 auto 56px;
  }

  .section-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rose-dark);
    margin-bottom: 12px;
  }

  .section-title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--dark);
    margin-bottom: 16px;
    line-height: 1.15;
  }

  .section-desc {
    font-size: 17px;
    color: var(--gray);
    line-height: 1.7;
  }

  .servizi-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }

  .servizio-card {
    background: var(--white);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(201,169,154,0.12);
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }

  .servizio-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rose), var(--gold));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .servizio-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow);
  }

  .servizio-card:hover::before {
    opacity: 1;
  }

  .servizio-icon {
    width: 60px;
    height: 60px;
    background: var(--rose-light);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 20px;
    transition: background 0.3s;
  }

  .servizio-card:hover .servizio-icon {
    background: var(--rose);
  }

  .servizio-nome {
    font-size: 19px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 10px;
  }

  .servizio-desc {
    font-size: 14px;
    color: var(--gray);
    line-height: 1.7;
  }

  /* CHI SIAMO */
  #chi-siamo {
    padding: 80px 24px;
    background: var(--white);
  }

  .chi-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .chi-visual {
    position: relative;
  }

  .chi-img-placeholder {
    width: 100%;
    aspect-ratio: 4/5;
    background: linear-gradient(145deg, var(--rose-light) 0%, var(--gold-light) 100%);
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .chi-img-placeholder::before {
    content: '✿';
    font-size: 80px;
    opacity: 0.25;
    position: absolute;
    top: 20px;
    right: 20px;
  }

  .chi-img-placeholder::after {
    content: '◈';
    font-size: 60px;
    opacity: 0.15;
    position: absolute;
    bottom: 30px;
    left: 20px;
  }

  .chi-img-emoji {
    font-size: 72px;
    margin-bottom: 12px;
  }

  .chi-img-label {
    font-size: 13px;
    color: var(--rose-dark);
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .chi-badge-float {
    position: absolute;
    bottom: -20px;
    right: -20px;
    background: var(--dark);
    color: var(--white);
    padding: 20px 24px;
    border-radius: 20px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .chi-badge-float .num {
    display: block;
    font-size: 32px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .chi-badge-float .lbl {
    display: block;
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .chi-content .section-tag {
    text-align: left;
  }

  .chi-content .section-title {
    text-align: left;
  }

  .chi-content .section-desc {
    text-align: left;
    margin-bottom: 24px;
  }

  .chi-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 36px;
  }

  .chi-list li {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 15px;
    color: var(--dark-soft);
    line-height: 1.5;
  }

  .chi-list li::before {
    content: '✓';
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    min-width: 24px;
    background: var(--rose-light);
    color: var(--rose-dark);
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    margin-top: 1px;
  }

  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--rose-dark);
    text-decoration: none;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    border: 2px solid var(--rose);
    transition: all 0.3s;
  }

  .btn-outline:hover {
    background: var(--rose);
    color: var(--dark);
    transform: translateY(-2px);
  }

  @media (max-width: 768px) {
    .chi-inner {
      grid-template-columns: 1fr;
      gap: 48px;
    }

    .chi-badge-float {
      bottom: -10px;
      right: 10px;
    }
  }

  /* RECENSIONI */
  #recensioni {
    background: var(--dark);
    padding: 80px 24px;
    position: relative;
    overflow: hidden;
  }

  #recensioni::before {
    content: '"';
    position: absolute;
    top: -20px;
    left: -10px;
    font-size: 300px;
    color: rgba(255,255,255,0.03);
    font-family: Georgia, serif;
    line-height: 1;
    pointer-events: none;
  }

  #recensioni .section-tag {
    color: var(--gold);
  }

  #recensioni .section-title {
    color: var(--white);
  }

  #recensioni .section-desc {
    color: rgba(255,255,255,0.55);
  }

  .rating-summary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .rating-big {
    font-size: 64px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .rating-details {
    text-align: left;
  }

  .stars-row {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
  }

  .star {
    font-size: 22px;
    color: var(--gold);
  }

  .rating-count {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
  }

  .recensioni-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
  }

  .recensione-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 20px;
    padding: 28px;
    transition: background 0.3s;
  }

  .recensione-card:hover {
    background: rgba(255,255,255,0.08);
  }

  .rec-stars {
    display: flex;
    gap: 3px;
    margin-bottom: 14px;
  }

  .rec-stars span {
    font-size: 16px;
    color: var(--gold);
  }

  .rec-text {
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    line-height: 1.7;
    margin-bottom: 20px;
    font-style: italic;
  }

  .rec-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .rec-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--dark);
    flex-shrink: 0;
  }

  .rec-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
  }

  .rec-date {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }

  /* CONTATTI */
  #contatti {
    background: var(--gray-light);
    padding: 80px 24px;
  }

  .contatti-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: start;
  }

  .contatti-info {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .contatto-item {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    background: var(--white);
    border-radius: 16px;
    padding: 22px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(201,169,154,0.15);
    transition: transform 0.3s;
  }

  .contatto-item:hover {
    transform: translateX(4px);
  }

  .contatto-icon {
    width: 50px;
    height: 50px;
    background: var(--rose-light);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .contatto-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--rose-dark);
    margin-bottom: 4px;
  }

  .contatto-value {
    font-size: 16px;
    font-weight: 600;
    color: var(--dark);
    text-decoration: none;
    transition: color 0.2s;
    display: block;
  }

  .contatto-value:hover {
    color: var(--rose-dark);
  }

  .contatto-sub {
    font-size: 13px;
    color: var(--gray);
    margin-top: 2px;
  }

  .contatti-cta {
    background: var(--white);
    border-radius: 24px;
    padding: 40px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(201,169,154,0.15);
    text-align: center;
  }

  .contatti-cta-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 24px;
  }

  .contatti-cta h3 {
    font-size: 24px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 12px;
  }

  .contatti-cta p {
    font-size: 15px;
    color: var(--gray);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .btn-call {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--rose-dark), var(--dark));
    color: var(--white);
    text-decoration: none;
    padding: 18px 40px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: all 0.3s;
    box-shadow: 0 4px 24px rgba(44,31,26,0.3);
    width: 100%;
    justify-content: center;
  }

  .btn-call:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 40px rgba(44,31,26,0.4);
  }

  .orari-grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
    text-align: left;
  }

  .orario-row {
    display: flex;
    justify-content: space-between;
